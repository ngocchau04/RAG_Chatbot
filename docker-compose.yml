services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ragchatbot-api
    env_file:
      - .env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ragchatbot-web
    environment:
      NODE_ENV: production
      API_INTERNAL_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: /backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
